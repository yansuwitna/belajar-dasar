<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MLBB Leaderboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #1b2735 0%, #090a0f 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            text-shadow: 2px 2px 4px #000;
        }

        .card {
            border-radius: 20px;
            background: rgba(15, 20, 30, 0.95);
            border: 2px solid #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .table {
            color: #fff;
            border-color: #4a5a75;
        }

        .table-dark th {
            background-color: #d4af37 !important;
            color: #000 !important;
        }

        .table-striped tbody tr:nth-of-type(odd) {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .table-striped tbody tr:nth-of-type(even) {
            background-color: transparent;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="card p-4 shadow">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>🏆 MATCH HISTORY 🏆</h2>
                <a href="index.html" class="btn btn-warning fw-bold">⬅ BACK TO LOBBY</a>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-striped text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>IGN (Pemain)</th>
                            <th>Waktu Match</th>
                            <th>Materi Dipelajari</th>
                            <th>Skor Benar</th>
                            <th>Skor Salah</th>
                            <th>Fast Hand / Soal</th>
                            <th>Total Durasi</th>
                        </tr>
                    </thead>
                    <tbody id="dbTableBody">
                        <tr>
                            <td colspan="7">Memuat riwayat server...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="text-end mt-3">
                <button class="btn btn-danger btn-lg fw-bold" onclick="clearDatabase()">🗑️ CLEAR HISTORY</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'api.php';

        function renderDatabase() {
            fetch(`${API_URL}?action=get`)
                .then(res => res.json())
                .then(history => {
                    const tbody = document.getElementById('dbTableBody');
                    tbody.innerHTML = "";

                    if (!history || history.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="7" class="text-secondary">Belum ada pemain yang masuk ke Land of Dawn.</td></tr>`;
                        return;
                    }

                    history.forEach(row => {
                        let tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="text-warning fw-bold">${row.nama}</td>
                            <td>${row.tanggal}</td>
                            <td class="text-capitalize text-info">${row.kategori}</td>
                            <td class="text-success fw-bold">${row.benar}</td>
                            <td class="text-danger fw-bold">${row.salah}</td>
                            <td>${row.rataWaktu}s</td>
                            <td>${row.totalWaktu}s</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => {
                    document.getElementById('dbTableBody').innerHTML = `<tr><td colspan="7" class="text-danger">Gagal terhubung ke database SQLite.</td></tr>`;
                });
        }

        function clearDatabase() {
            Swal.fire({
                title: 'Wipe Out Server?',
                text: "Semua history pertandingan akan hilang permanen!",
                icon: 'warning',
                showCancelButton: true,
                background: '#1b2735', color: '#fff',
                confirmButtonColor: '#d33', cancelButtonColor: '#3085d6',
                confirmButtonText: 'Ya, Hapus!', cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch(`${API_URL}?action=clear`, { method: 'POST' })
                        .then(() => {
                            Swal.fire({ title: 'Wiped Out!', text: 'Data server telah dibersihkan.', icon: 'success', background: '#1b2735', color: '#fff' });
                            renderDatabase();
                        })
                        .catch(err => Swal.fire('Error', 'Gagal menghapus data.', 'error'));
                }
            })
        }

        renderDatabase();
    </script>
</body>

</html>
