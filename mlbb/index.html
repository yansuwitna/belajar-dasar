<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MLBB Knowledge Base</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            /* Tema Gelap Khas Game MOBA */
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        h1,
        h2 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            text-shadow: 2px 2px 4px #000;
        }

        .card {
            border-radius: 15px;
            background: rgba(15, 20, 30, 0.9);
            border: 2px solid #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            color: #fff;
        }

        .form-control,
        .form-select {
            background-color: #1a2233;
            color: #fff;
            border: 1px solid #4a5a75;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #222d42;
            color: #e0b0ff;
            border-color: #d4af37;
            box-shadow: none;
        }

        #answers {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .answer-btn {
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            min-width: 200px;
            margin: 10px;
            border-radius: 10px;
            border: 2px solid #00c6ff;
            background: #001528;
            color: #00c6ff;
            transition: all 0.3s ease;
        }

        .answer-btn:hover {
            background: #00c6ff;
            color: #000;
            box-shadow: 0 0 15px #00c6ff;
        }

        .question-text {
            font-size: 2rem;
            font-weight: bold;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="container py-4">

        <h1 class="text-center mb-3">⚔️ MLBB ACADEMY ⚔️</h1>

        <div id="setup" class="card p-4 shadow">
            <h3 class="text-center mb-4 text-warning">Perdalam Makro & Mikro-mu!</h3>

            <form id="setupForm">
                <div class="mt-3">
                    <label class="fw-bold text-info">IGN (In-Game Name)</label>
                    <input id="playerName" type="text" class="form-control form-control-lg"
                        placeholder="Contoh: RRQ Lemon" required>
                </div>

                <div class="mt-3">
                    <label class="fw-bold text-info">Waktu Menjawab (detik)</label>
                    <input id="timeLimit" type="number" class="form-control form-control-lg" value="15">
                </div>

                <div class="mt-3">
                    <label class="fw-bold text-info">Fokus Latihan</label>
                    <select id="kategori" class="form-select form-select-lg" multiple required style="height: 150px;">
                    </select>
                    <small class="text-secondary">Tahan Ctrl/Cmd untuk memilih banyak materi.</small>
                </div>

                <button type="submit" class="btn btn-warning btn-lg w-100 mt-4 fw-bold">ENTER LAND OF DAWN 🚀</button>
                <!-- <a href="riwayat.html" class="btn btn-outline-info w-100 mt-3">📊 Leaderboard & Riwayat</a> -->
            </form>
        </div>

        <div id="quiz" class="card p-4 shadow mt-4 d-none">
            <div class="d-flex justify-content-between mb-3 border-bottom pb-2 border-secondary">
                <span class="badge bg-success fs-5">KDA / Benar: <span id="liveCorrect">0</span></span>
                <span class="badge bg-danger fs-5">Feeder / Salah: <span id="liveWrong">0</span></span>
            </div>

            <div class="progress mb-3" style="height:20px; background-color: #333;">
                <div id="timeBar" class="progress-bar bg-warning"></div>
            </div>

            <div id="question" class="text-center my-4 question-text text-light"></div>
            <div id="answers"></div>

            <button id="stopQuiz" class="btn btn-danger btn-lg w-100 mt-4 fw-bold">SURRENDER (SELESAI)</button>
        </div>

        <div id="result" class="card p-4 shadow mt-4 text-center d-none">
            <h2>🏆 MATCH RESULT 🏆</h2>
            <h3 class="text-info mb-3">GGWP, <span id="displayName"></span>!</h3>
            <p class="fs-1 text-success mb-1">✅ Benar: <span id="correct">0</span></p>
            <p class="fs-1 text-danger mb-1">❌ Salah: <span id="wrong">0</span></p>
            <p class="fs-4 text-light mb-1">⏱️ Fast Hand: <span id="avgTimeDisplay">0</span></p>
            <p class="fs-4 text-warning">⏳ Durasi Match: <span id="totalTimeDisplay">0</span></p>

            <button class="btn btn-warning btn-lg mt-3 fw-bold w-100" onclick="location.reload()">🔄 MAIN LAGI</button>
            <!-- <a href="riwayat.html" class="btn btn-outline-info btn-lg mt-2 w-100">📊 LIHAT RIWAYAT</a> -->
        </div>

    </div>

    <!-- Audio FX Game -->
    <audio id="sndOk" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.wav"></audio>
    <audio id="sndFail" src="https://assets.mixkit.co/sfx/preview/mixkit-cartoon-failure-piano-473.wav"></audio>
    <audio id="sndTime" src="https://assets.mixkit.co/sfx/preview/mixkit-alarm-tone-996.wav"></audio>

    <script>
        let wordBank = {};
        let playerName = "", timeLimit, selectedCategories = [];
        let pool = [];
        let correct = 0, wrong = 0, timer, current;
        let totalTimeSpent = 0, totalQuestions = 0, questionStartTime = 0;
        let quizSessionStartTime = 0;

        const q = document.getElementById("question");
        const ans = document.getElementById("answers");
        const bar = document.getElementById("timeBar");

        const DB_API_URL = 'api.php';

        function rand(a, b) {
            return Math.floor(Math.random() * (b - a + 1)) + a;
        }

        function gen() {
            let target = pool[rand(0, pool.length - 1)];
            let result = target.jawaban;
            let options = [result];

            // Filter agar opsi yang muncul tidak duplikat
            let uniqueAnswers = [...new Set(pool.map(item => item.jawaban))];

            while (options.length < 4 && uniqueAnswers.length >= 4) {
                let fakeTarget = uniqueAnswers[rand(0, uniqueAnswers.length - 1)];
                if (!options.includes(fakeTarget)) {
                    options.push(fakeTarget);
                }
            }

            return {
                soal: target.soal,
                jawaban: result,
                options: options.sort(() => Math.random() - 0.5)
            };
        }

        function startQuiz() {
            clearInterval(timer);
            current = gen();
            questionStartTime = Date.now();

            q.innerText = current.soal;
            ans.innerHTML = "";

            current.options.forEach(val => {
                const btn = document.createElement("button");
                btn.className = "btn answer-btn p-3";
                btn.textContent = val;
                btn.onclick = () => checkAnswer(val);
                ans.appendChild(btn);
            });

            let t = timeLimit;
            bar.style.width = "100%";
            timer = setInterval(() => {
                t--;
                bar.style.width = (t / timeLimit * 100) + "%";
                if (t <= 0) {
                    clearInterval(timer);
                    let timeSpent = (Date.now() - questionStartTime) / 1000;
                    totalTimeSpent += timeSpent;
                    totalQuestions++;
                    wrong++;
                    document.getElementById("liveWrong").textContent = wrong;
                    document.getElementById("sndTime").play();

                    Swal.fire({
                        icon: "warning",
                        title: "WAKTU HABIS!",
                        text: `Jawaban: ${current.jawaban}`,
                        background: '#1b2735', color: '#fff',
                        confirmButtonText: "Lanjut"
                    }).then(startQuiz);
                }
            }, 1000);
        }

        function checkAnswer(val) {
            clearInterval(timer);
            let timeSpent = (Date.now() - questionStartTime) / 1000;
            totalTimeSpent += timeSpent;
            totalQuestions++;

            document.querySelectorAll(".answer-btn").forEach(b => b.disabled = true);

            if (val === current.jawaban) {
                correct++;
                document.getElementById("liveCorrect").textContent = correct;
                document.getElementById("sndOk").play();
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

                Swal.fire({
                    icon: "success",
                    title: "FIRST BLOOD! (BENAR)",
                    background: '#1b2735', color: '#fff',
                    timer: 1200, showConfirmButton: false
                }).then(startQuiz);
            } else {
                wrong++;
                document.getElementById("liveWrong").textContent = wrong;
                document.getElementById("sndFail").play();

                Swal.fire({
                    icon: "error",
                    title: "YOU HAS BEEN SLAIN! (SALAH)",
                    text: `Jawaban benar: ${current.jawaban}`,
                    background: '#1b2735', color: '#fff',
                    confirmButtonColor: '#d33',
                    confirmButtonText: "Respawn"
                }).then(startQuiz);
            }
        }

        async function loadCategories() {
            try {
                const response = await fetch('mlbb.json');
                const data = await response.json();
                const selectElement = document.getElementById('kategori');
                selectElement.innerHTML = "";
                Object.keys(data).forEach(category => {
                    let option = document.createElement('option');
                    option.value = category;
                    option.textContent = category.replace(/_/g, ' ').toUpperCase();
                    selectElement.appendChild(option);
                });
            } catch (error) {
                console.error("Gagal memuat kategori:", error);
            }
        }
        loadCategories();

        document.getElementById("setupForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            selectedCategories = [...document.getElementById("kategori").selectedOptions].map(o => o.value);

            if (selectedCategories.length === 0) {
                Swal.fire({ icon: 'warning', title: 'Pilih Role!', text: 'Pilih minimal satu materi.', background: '#1b2735', color: '#fff' });
                return;
            }

            Swal.fire({
                title: '🔄 Matching Up...',
                text: 'Memasuki Land of Dawn.',
                background: '#1b2735', color: '#fff',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            try {
                const response = await fetch('mlbb.json');
                wordBank = await response.json();

                pool = [];
                selectedCategories.forEach(cat => {
                    if (wordBank[cat]) pool.push(...wordBank[cat]);
                });

                // Cek unik jawaban untuk PG
                let uniqueAnswers = [...new Set(pool.map(item => item.jawaban))];
                if (uniqueAnswers.length < 4) {
                    Swal.fire({ icon: 'error', title: 'Data Kurang', text: 'Materi ini memiliki kurang dari 4 opsi jawaban unik. Tambahkan data di mlbb.json', background: '#1b2735', color: '#fff' });
                    return;
                }

                Swal.close();
                playerName = document.getElementById("playerName").value;
                timeLimit = Number(document.getElementById("timeLimit").value);

                correct = 0; wrong = 0; totalTimeSpent = 0; totalQuestions = 0;
                document.getElementById("liveCorrect").textContent = correct;
                document.getElementById("liveWrong").textContent = wrong;
                document.getElementById("setup").classList.add("d-none");
                document.getElementById("quiz").classList.remove("d-none");

                quizSessionStartTime = Date.now();
                startQuiz();

            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Network Disconnected', text: 'Gagal memuat mlbb.json', background: '#1b2735', color: '#fff' });
            }
        });

        document.getElementById("stopQuiz").onclick = () => {
            clearInterval(timer);
            let totalWaktuKeseluruhan = ((Date.now() - quizSessionStartTime) / 1000).toFixed(2);

            document.getElementById("quiz").classList.add("d-none");
            document.getElementById("result").classList.remove("d-none");
            document.getElementById("displayName").textContent = playerName;
            document.getElementById("correct").textContent = correct;
            document.getElementById("wrong").textContent = wrong;
            document.getElementById("totalTimeDisplay").textContent = `${totalWaktuKeseluruhan} detik`;

            let avgTime = totalQuestions > 0 ? (totalTimeSpent / totalQuestions).toFixed(2) : 0;
            document.getElementById("avgTimeDisplay").textContent = `${avgTime} detik/soal`;

            if (totalQuestions > 0) {
                let today = new Date().toLocaleString("id-ID");
                let selectedCatNames = selectedCategories.join(', ');
                let dataToSave = { nama: playerName, tanggal: today, kategori: selectedCatNames, benar: correct, salah: wrong, rataWaktu: avgTime, totalWaktu: totalWaktuKeseluruhan };

                fetch(`${DB_API_URL}?action=save`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dataToSave)
                });
            }
        };
    </script>
</body>

</html>
