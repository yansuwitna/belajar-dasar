<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kuis Bahasa Inggris Ceria</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: linear-gradient(135deg, #a8ff78, #78ffd6);
            font-family: 'Poppins', sans-serif;
        }

        .card {
            border-radius: 25px;
            background: #fff;
        }

        h1,
        h2,
        h3 {
            font-weight: bold
        }

        #answers {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .answer-btn {
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            font-size: 1.8rem;
            min-width: 150px;
            height: 90px;
            margin: 10px;
            border-radius: 20px;
        }

        @keyframes pop {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.3)
            }

            100% {
                transform: scale(1)
            }
        }

        @keyframes shake {
            0% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-12px)
            }

            50% {
                transform: translateX(12px)
            }

            75% {
                transform: translateX(-12px)
            }

            100% {
                transform: translateX(0)
            }
        }

        .correct {
            animation: pop .4s
        }

        .wrong {
            animation: shake .4s
        }
    </style>
</head>

<body>
    <div class="container py-4">

        <h1 class="text-center mb-3">🔤🎉 KUIS BAHASA INGGRIS CERIA 🎉🔤</h1>

        <div id="setup" class="card p-4 shadow">
            <h3 class="text-center">🎈 Ayo Belajar Kosakata!</h3>
            <form id="setupForm">
                <div class="mt-3">
                    <label>👤 Nama Pemain</label>
                    <input id="playerName" type="text" class="form-control form-control-lg"
                        placeholder="Masukkan namamu..." required>
                </div>

                <div class="mt-3">
                    <label>⏱ Waktu Menjawab (detik)</label>
                    <input id="timeLimit" type="number" class="form-control form-control-lg" value="10">
                </div>

                <div class="mt-3">
                    <label>📚 Pilih Kategori Kosakata</label>
                    <select id="kategori" class="form-select form-select-lg" multiple required style="height: 200px;">
                    </select>
                    <small class="text-muted">Tahan tombol Ctrl (Windows) / Cmd (Mac) untuk memilih lebih dari satu.</small>
                </div>

                <div class="mt-3">
                    <label>👁️ Tampilan Teks Soal</label>
                    <select id="showTextOpt" class="form-select form-select-lg">
                        <option value="yes" selected>Tampilkan Teks Soal</option>
                        <option value="no">Sembunyikan (Hanya Suara)</option>
                    </select>
                </div>

                <div class="mt-3">
                    <label>🔊 Tombol Ulangi Suara</label>
                    <select id="showRepeatOpt" class="form-select form-select-lg">
                        <option value="yes">Aktifkan Tombol Ulangi</option>
                        <option value="no" selected>Nonaktifkan</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success btn-lg w-100 mt-4">🚀 MULAI MAIN</button>
                <!-- <a href="riwayat.html" class="btn btn-outline-dark w-100 mt-2">📊 Lihat Halaman Riwayat</a> -->
            </form>
        </div>

        <div id="quiz" class="card p-4 shadow mt-4 d-none">
            <div class="d-flex justify-content-between mb-3">
                <span class="badge bg-success fs-4">😊 Benar: <span id="liveCorrect">0</span></span>
                <span class="badge bg-danger fs-4">😢 Salah: <span id="liveWrong">0</span></span>
            </div>

            <div class="progress mb-3" style="height:30px">
                <div id="timeBar" class="progress-bar bg-info fs-4"></div>
            </div>

            <h1 id="question" class="text-center display-1 my-3 text-uppercase"></h1>

            <div class="text-center mb-3">
                <button id="btnRepeat" class="btn btn-info btn-lg d-none">🔊 Ulangi Soal</button>
            </div>

            <div id="answers"></div>

            <button id="stopQuiz" class="btn btn-danger btn-lg w-100 mt-4">🛑 SELESAI</button>
        </div>

        <div id="result" class="card p-4 shadow mt-4 text-center d-none">
            <h2>🏆 HASIL AKHIR 🏆</h2>
            <h3 class="text-primary mb-3">Great job, <span id="displayName"></span>!</h3>
            <p class="fs-1 text-success mb-1">😊 Benar: <span id="correct">0</span></p>
            <p class="fs-1 text-danger mb-1">😢 Salah: <span id="wrong">0</span></p>
            <p class="fs-3 text-info mb-1">⏱️ Rata-rata: <span id="avgTimeDisplay">0</span></p>
            <p class="fs-3 text-warning">⏳ Total Waktu Main: <span id="totalTimeDisplay">0</span></p>

            <button class="btn btn-primary btn-lg mt-2" onclick="location.reload()">🔄 Main Lagi</button>
            <!-- <a href="riwayat.html" class="btn btn-secondary btn-lg mt-2">📊 Kelola Riwayat</a> -->
        </div>

    </div>

    <audio id="sndOk" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.wav"></audio>
    <audio id="sndFail" src="https://assets.mixkit.co/sfx/preview/mixkit-cartoon-failure-piano-473.wav"></audio>
    <audio id="sndTime" src="https://assets.mixkit.co/sfx/preview/mixkit-alarm-tone-996.wav"></audio>

    <script>
        let wordBank = {};
        let playerName = "", timeLimit, selectedCategories = [];
        let pool = [];
        let isShowText, isShowRepeat;
        let correct = 0, wrong = 0, timer, current;
        let totalTimeSpent = 0, totalQuestions = 0, questionStartTime = 0;
        let quizSessionStartTime = 0;

        const q = document.getElementById("question");
        const ans = document.getElementById("answers");
        const bar = document.getElementById("timeBar");
        const btnRepeat = document.getElementById("btnRepeat");
        const sndOk = document.getElementById("sndOk");
        const sndFail = document.getElementById("sndFail");
        const sndTime = document.getElementById("sndTime");

        const DB_API_URL = 'api.php';

        function speakEnglish(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function speakIndo(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID';
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function rand(a, b) {
            return Math.floor(Math.random() * (b - a + 1)) + a;
        }

        function gen() {
            let target = pool[rand(0, pool.length - 1)];
            let result = target.id;
            let options = [result];

            while (options.length < 4) {
                let fakeTarget = pool[rand(0, pool.length - 1)];
                if (!options.includes(fakeTarget.id)) {
                    options.push(fakeTarget.id);
                }
            }

            return {
                question: target.en,
                answer: result,
                options: options.sort(() => Math.random() - 0.5),
                speechText: target.en
            };
        }

        function startQuiz() {
            clearInterval(timer);
            current = gen();
            questionStartTime = Date.now();

            if (isShowText) {
                q.textContent = current.question;
            } else {
                q.textContent = "🔊 Listen...";
            }

            if (isShowRepeat) {
                btnRepeat.classList.remove("d-none");
            } else {
                btnRepeat.classList.add("d-none");
            }

            ans.innerHTML = "";
            speakEnglish(current.speechText);

            current.options.forEach(val => {
                const btn = document.createElement("button");
                btn.className = "btn btn-outline-success answer-btn";
                btn.textContent = val;
                btn.onclick = () => checkAnswer(val);
                ans.appendChild(btn);
            });

            let t = timeLimit;
            bar.style.width = "100%";
            timer = setInterval(() => {
                t--;
                bar.style.width = (t / timeLimit * 100) + "%";
                if (t <= 0) {
                    clearInterval(timer);
                    let timeSpent = (Date.now() - questionStartTime) / 1000;
                    totalTimeSpent += timeSpent;
                    totalQuestions++;
                    wrong++;
                    document.getElementById("liveWrong").textContent = wrong;
                    sndTime.play();
                    speakIndo("Yah, waktu habis!");
                    Swal.fire({
                        icon: "warning",
                        title: "⏰ Waktu Habis!",
                        text: `Artinya adalah: ${current.answer}`,
                        confirmButtonText: "Lanjut Soal"
                    }).then(startQuiz);
                }
            }, 1000);
        }

        function checkAnswer(val) {
            clearInterval(timer);
            let timeSpent = (Date.now() - questionStartTime) / 1000;
            totalTimeSpent += timeSpent;
            totalQuestions++;
            document.querySelectorAll(".answer-btn").forEach(b => b.disabled = true);

            if (val === current.answer) {
                correct++;
                document.getElementById("liveCorrect").textContent = correct;
                sndOk.play();
                confetti();
                speakIndo("Bagus, kamu benar!");
                Swal.fire({
                    icon: "success",
                    title: "🎉 BENAR!",
                    confirmButtonText: "Lanjut Soal"
                }).then(startQuiz);
            } else {
                wrong++;
                document.getElementById("liveWrong").textContent = wrong;
                sndFail.play();
                speakIndo("Ups, masih salah.");
                Swal.fire({
                    icon: "error",
                    title: "😢 SALAH",
                    text: `Artinya adalah: ${current.answer}`,
                    confirmButtonText: "Lanjut Soal"
                }).then(startQuiz);
            }
        }

        btnRepeat.onclick = () => {
            if (current && current.speechText) speakEnglish(current.speechText);
        };

        // KODE BARU: Mengambil data dari file lokal kamus.json
        document.getElementById("setupForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            selectedCategories = [...document.getElementById("kategori").selectedOptions].map(o => o.value);

            if (selectedCategories.length === 0) {
                alert("Pilih minimal satu kategori!");
                return;
            }

            Swal.fire({
                title: '🔄 Memuat Kosakata...',
                text: 'Harap tunggu sebentar.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            try {
                // Fetch mengarah ke file kamus.json di folder yang sama
                const response = await fetch('kamus.json');
                if (!response.ok) throw new Error("Gagal memuat file kamus.json");

                wordBank = await response.json();

                pool = [];
                selectedCategories.forEach(cat => {
                    if (wordBank[cat]) {
                        pool.push(...wordBank[cat]);
                    }
                });

                if (pool.length < 4) {
                    Swal.fire('Error', 'Kosakata di kategori ini terlalu sedikit (minimal 4 kata dibutuhkan). Silakan edit kamus.json.', 'error');
                    return;
                }

                Swal.close();

                playerName = document.getElementById("playerName").value;
                timeLimit = Number(document.getElementById("timeLimit").value);
                isShowText = document.getElementById("showTextOpt").value === "yes";
                isShowRepeat = document.getElementById("showRepeatOpt").value === "yes";

                correct = 0; wrong = 0; totalTimeSpent = 0; totalQuestions = 0;
                document.getElementById("liveCorrect").textContent = correct;
                document.getElementById("liveWrong").textContent = wrong;
                document.getElementById("setup").classList.add("d-none");
                document.getElementById("quiz").classList.remove("d-none");

                quizSessionStartTime = Date.now();
                startQuiz();

            } catch (error) {
                console.error(error);
                Swal.fire('Gagal', 'Pastikan file kamus.json ada di folder yang sama dan kamu membukanya melalui localhost (XAMPP/Laragon).', 'error');
            }
        });

        document.getElementById("stopQuiz").onclick = () => {
            clearInterval(timer);
            window.speechSynthesis.cancel();

            let totalWaktuKeseluruhan = ((Date.now() - quizSessionStartTime) / 1000).toFixed(2);

            document.getElementById("quiz").classList.add("d-none");
            document.getElementById("result").classList.remove("d-none");
            document.getElementById("displayName").textContent = playerName;
            document.getElementById("correct").textContent = correct;
            document.getElementById("wrong").textContent = wrong;
            document.getElementById("totalTimeDisplay").textContent = `${totalWaktuKeseluruhan} detik`;

            let avgTime = totalQuestions > 0 ? (totalTimeSpent / totalQuestions).toFixed(2) : 0;
            document.getElementById("avgTimeDisplay").textContent = `${avgTime} detik/soal`;

            if (totalQuestions > 0) {
                let today = new Date().toLocaleString("id-ID");
                let selectedCatNames = selectedCategories.join(', ');

                let dataToSave = {
                    nama: playerName,
                    tanggal: today,
                    kategori: selectedCatNames,
                    benar: correct,
                    salah: wrong,
                    rataWaktu: avgTime,
                    totalWaktu: totalWaktuKeseluruhan
                };

                fetch(`${DB_API_URL}?action=save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSave)
                })
                    .then(res => res.json())
                    .then(response => {
                        speakIndo(`Luar biasa ${playerName}! Kamu berhasil menjawab ${correct} soal dengan benar.`);
                    })
                    .catch(err => console.error("Gagal menyimpan ke server", err));
            } else {
                speakIndo("Kamu belum menjawab soal apapun.");
            }
        };

        // Fungsi untuk memuat kategori secara otomatis saat halaman dibuka
            async function loadCategories() {
                try {
                    const response = await fetch('kamus.json');
                    const data = await response.json();
                    const selectElement = document.getElementById('kategori');

                    // Bersihkan isi select
                    selectElement.innerHTML = "";

                    // Loop melalui data JSON dan buatkan option
                    Object.keys(data).forEach(category => {
                        let option = document.createElement('option');
                        option.value = category;
                        // Huruf pertama jadi kapital agar terlihat rapi
                        option.textContent = category.charAt(0).toUpperCase() + category.slice(1);
                        selectElement.appendChild(option);
                    });
                } catch (error) {
                    console.error("Gagal memuat kategori:", error);
                }
            }

            // Panggil fungsi ini saat halaman dimuat
            loadCategories();
    </script>
</body>

</html>
