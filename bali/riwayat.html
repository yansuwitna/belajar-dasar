<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelola Riwayat Bahasa Bali</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            /* Tema Tridatu (Merah & Emas) */
            background: linear-gradient(135deg, #f12711, #f5af19);
            font-family: 'Poppins', sans-serif;
        }

        .card {
            border-radius: 25px;
            background: #fff;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="card p-4 shadow">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>📚 Data Riwayat Kuis Pemain</h2>
                <a href="index.html" class="btn btn-warning fw-bold text-dark">⬅ Kembali ke Kuis</a>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-striped text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Nama</th>
                            <th>Tanggal & Waktu</th>
                            <th>Kategori</th>
                            <th>Benar</th>
                            <th>Salah</th>
                            <th>Rata-rata / Soal</th>
                            <th>Total Waktu Main</th>
                        </tr>
                    </thead>
                    <tbody id="dbTableBody">
                        <tr>
                            <td colspan="7">Memuat data dari server...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="text-end mt-3">
                <button class="btn btn-danger btn-lg" onclick="clearDatabase()">🗑️ Hapus Semua Riwayat</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'api.php';

        function renderDatabase() {
            fetch(`${API_URL}?action=get`)
                .then(res => res.json())
                .then(history => {
                    const tbody = document.getElementById('dbTableBody');
                    tbody.innerHTML = "";

                    if (!history || history.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="7" class="text-muted">Data riwayat masih kosong.</td></tr>`;
                        return;
                    }

                    history.forEach(row => {
                        let tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="fw-bold">${row.nama}</td>
                            <td>${row.tanggal}</td>
                            <td class="text-capitalize">${row.kategori}</td>
                            <td class="text-success fw-bold">${row.benar}</td>
                            <td class="text-danger fw-bold">${row.salah}</td>
                            <td>${row.rataWaktu} detik</td>
                            <td>${row.totalWaktu} detik</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.getElementById('dbTableBody').innerHTML = `<tr><td colspan="7" class="text-danger">Gagal terhubung ke server database.</td></tr>`;
                });
        }

        // Fitur hapus riwayat menggunakan SweetAlert2
        function clearDatabase() {
            Swal.fire({
                title: 'Hapus Semua Data?',
                text: "Data riwayat pemain tidak dapat dikembalikan!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Ya, hapus!',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch(`${API_URL}?action=clear`, { method: 'POST' })
                        .then(() => {
                            Swal.fire('Terhapus!', 'Semua riwayat telah dihapus.', 'success');
                            renderDatabase();
                        })
                        .catch(err => Swal.fire('Error', 'Gagal menghapus data.', 'error'));
                }
            })
        }

        renderDatabase();
    </script>
</body>

</html>
