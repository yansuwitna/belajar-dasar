<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>💻 Kuis Pemrograman Web 🚀</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Poppins:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Poppins', sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .card {
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border: 3px solid #4facfe;
        }

        h1,
        h2,
        h3 {
            font-weight: 800;
        }

        #question {
            font-family: 'Fira Code', monospace;
            color: #1a2a6c;
            font-size: 2rem;
            font-weight: 600;
        }

        #answers {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .answer-btn {
            font-family: 'Fira Code', monospace;
            font-weight: 600;
            font-size: 1.2rem;
            min-width: 250px;
            padding: 15px 20px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .answer-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        @keyframes pop {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.1)
            }

            100% {
                transform: scale(1)
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            25%,
            75% {
                transform: translateX(-10px)
            }

            50% {
                transform: translateX(10px)
            }
        }
    </style>
</head>

<body>
    <div class="container py-4">
        <h1 class="text-center mb-4 text-white">👨‍💻 MASTER WEB DEV 👩‍💻</h1>

        <div id="setup" class="card p-4 shadow">
            <h3 class="text-center text-primary mb-4">⚙️ Konfigurasi Kuis</h3>
            <form id="setupForm">
                <div class="mb-3">
                    <label class="fw-bold">👤 Nama Developer</label>
                    <input id="playerName" type="text" class="form-control form-control-lg"
                        placeholder="Masukkan namamu..." required>
                </div>

                <div class="mb-3">
                    <label class="fw-bold">⏱ Waktu per Soal (detik)</label>
                    <input id="timeLimit" type="number" class="form-control form-control-lg" value="15" min="5"
                        required>
                </div>

                <div class="mb-4">
                    <label class="fw-bold">📚 Pilih Modul Bahasa</label>
                    <select id="kategori" class="form-select form-select-lg" multiple required
                        style="height: 160px;"></select>
                    <small class="text-muted">Tahan tombol Ctrl (Windows) / Cmd (Mac) untuk memilih lebih dari
                        satu.</small>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">🚀 MULAI COMPILE</button>
            </form>
        </div>

        <div id="quiz" class="card p-4 shadow mt-4 d-none">
            <div class="d-flex justify-content-between mb-3">
                <span class="badge bg-success fs-5">Score: <span id="liveCorrect">0</span></span>
                <span class="badge bg-danger fs-5">Bugs: <span id="liveWrong">0</span></span>
            </div>

            <div class="progress mb-4" style="height:25px; border-radius: 10px;">
                <div id="timeBar"
                    class="progress-bar bg-warning progress-bar-striped progress-bar-animated fs-5 text-dark fw-bold">
                </div>
            </div>

            <p id="question" class="text-center my-4"></p>

            <div id="answers" class="mb-4"></div>

            <button id="stopQuiz" class="btn btn-outline-danger btn-lg w-100 mt-3 fw-bold">🛑 AKHIRI SESI</button>
        </div>

        <div id="result" class="card p-4 shadow mt-4 text-center d-none">
            <h2 class="text-uppercase text-primary">🏆 Hasil Eksekusi 🏆</h2>
            <h3 class="mb-4">System Log: <span id="displayName" class="text-success"></span></h3>

            <div class="row text-center mb-4">
                <div class="col-6">
                    <p class="fs-1 mb-0">✅</p>
                    <p class="fs-4 text-success fw-bold"><span id="correct">0</span> Benar</p>
                </div>
                <div class="col-6">
                    <p class="fs-1 mb-0">🐛</p>
                    <p class="fs-4 text-danger fw-bold"><span id="wrong">0</span> Salah</p>
                </div>
            </div>

            <p class="fs-5 text-secondary">⏱️ Rata-rata Eksekusi: <span id="avgTimeDisplay"
                    class="fw-bold text-dark">0</span></p>
            <p class="fs-5 text-secondary mb-4">⏳ Total Uptime: <span id="totalTimeDisplay"
                    class="fw-bold text-dark">0</span></p>

            <button class="btn btn-primary btn-lg w-100 mb-2" onclick="location.reload()">🔄 Run Again</button>
            <!-- <a href="riwayat.html" class="btn btn-dark btn-lg w-100">📊 Buka Database Riwayat</a> -->
        </div>
    </div>

    <audio id="sndOk" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.wav"></audio>
    <audio id="sndFail" src="https://assets.mixkit.co/sfx/preview/mixkit-cartoon-failure-piano-473.wav"></audio>
    <audio id="sndTime" src="https://assets.mixkit.co/sfx/preview/mixkit-alarm-tone-996.wav"></audio>

    <script>
        let wordBank = {}, pool = [];
        let playerName = "", timeLimit, selectedCategories = [];
        let correct = 0, wrong = 0, timer, current;
        let totalTimeSpent = 0, totalQuestions = 0, questionStartTime = 0, quizSessionStartTime = 0;

        const q = document.getElementById("question");
        const ans = document.getElementById("answers");
        const bar = document.getElementById("timeBar");

        const sndOk = document.getElementById("sndOk");
        const sndFail = document.getElementById("sndFail");
        const sndTime = document.getElementById("sndTime");

        const DB_API_URL = 'api.php';

        function rand(a, b) {
            return Math.floor(Math.random() * (b - a + 1)) + a;
        }

        function gen() {
            // Ambil soal secara acak dari pool
            let target = pool[rand(0, pool.length - 1)];

            // Gabungkan jawaban benar dan pengecoh, lalu acak (shuffle) posisinya
            let options = [target.a, ...target.w];
            options.sort(() => Math.random() - 0.5);

            return {
                question: target.q,
                answer: target.a,
                options: options
            };
        }

        function startQuiz() {
            clearInterval(timer);
            current = gen();
            questionStartTime = Date.now();

            q.textContent = current.question;
            ans.innerHTML = "";

            current.options.forEach(val => {
                const btn = document.createElement("button");
                btn.className = "btn btn-outline-primary answer-btn";
                // Gunakan innerText untuk mencegah ekseskusi XSS jika ada karakter HTML (seperti <h1>)
                btn.innerText = val;
                btn.onclick = () => checkAnswer(val);
                ans.appendChild(btn);
            });

            let t = timeLimit;
            bar.style.width = "100%";

            timer = setInterval(() => {
                t--;
                bar.style.width = (t / timeLimit * 100) + "%";
                if (t <= 0) {
                    clearInterval(timer);
                    let timeSpent = (Date.now() - questionStartTime) / 1000;
                    totalTimeSpent += timeSpent;
                    totalQuestions++;
                    wrong++;
                    document.getElementById("liveWrong").textContent = wrong;
                    sndTime.play();

                    Swal.fire({
                        icon: "warning",
                        title: "Timeout! ⏰",
                        text: `Jawaban yang tepat: ${current.answer}`,
                        confirmButtonText: "Next",
                        confirmButtonColor: '#3085d6'
                    }).then(startQuiz);
                }
            }, 1000);
        }

        function checkAnswer(val) {
            clearInterval(timer);
            let timeSpent = (Date.now() - questionStartTime) / 1000;
            totalTimeSpent += timeSpent;
            totalQuestions++;
            document.querySelectorAll(".answer-btn").forEach(b => b.disabled = true);

            if (val === current.answer) {
                correct++;
                document.getElementById("liveCorrect").textContent = correct;
                sndOk.play();
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

                Swal.fire({
                    icon: "success",
                    title: "Compile Success! ✅",
                    timer: 1500,
                    showConfirmButton: false
                }).then(startQuiz);
            } else {
                wrong++;
                document.getElementById("liveWrong").textContent = wrong;
                sndFail.play();

                Swal.fire({
                    icon: "error",
                    title: "Syntax Error! 🐛",
                    text: `Seharusnya: ${current.answer}`,
                    confirmButtonText: "Debug Next",
                    confirmButtonColor: '#d33'
                }).then(startQuiz);
            }
        }

        document.getElementById("setupForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            selectedCategories = [...document.getElementById("kategori").selectedOptions].map(o => o.value);
            if (selectedCategories.length === 0) return alert("Pilih minimal satu modul!");

            Swal.fire({
                title: 'Loading Environment...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            try {
                const response = await fetch('materi.json');
                if (!response.ok) throw new Error("Gagal memuat materi.json");

                wordBank = await response.json();
                pool = [];

                selectedCategories.forEach(cat => {
                    if (wordBank[cat]) pool.push(...wordBank[cat]);
                });

                if (pool.length < 1) {
                    Swal.fire('Error', 'Modul kosong.', 'error');
                    return;
                }

                Swal.close();

                playerName = document.getElementById("playerName").value;
                timeLimit = Number(document.getElementById("timeLimit").value);

                correct = 0; wrong = 0; totalTimeSpent = 0; totalQuestions = 0;
                document.getElementById("liveCorrect").textContent = correct;
                document.getElementById("liveWrong").textContent = wrong;

                document.getElementById("setup").classList.add("d-none");
                document.getElementById("quiz").classList.remove("d-none");

                quizSessionStartTime = Date.now();
                startQuiz();

            } catch (error) {
                console.error(error);
                Swal.fire('Gagal', 'Pastikan materi.json ada di folder localhost!', 'error');
            }
        });

        document.getElementById("stopQuiz").onclick = () => {
            clearInterval(timer);

            let totalWaktuKeseluruhan = ((Date.now() - quizSessionStartTime) / 1000).toFixed(2);
            document.getElementById("quiz").classList.add("d-none");
            document.getElementById("result").classList.remove("d-none");

            document.getElementById("displayName").textContent = playerName;
            document.getElementById("correct").textContent = correct;
            document.getElementById("wrong").textContent = wrong;
            document.getElementById("totalTimeDisplay").textContent = `${totalWaktuKeseluruhan} detik`;

            let avgTime = totalQuestions > 0 ? (totalTimeSpent / totalQuestions).toFixed(2) : 0;
            document.getElementById("avgTimeDisplay").textContent = `${avgTime} detik/soal`;

            if (totalQuestions > 0) {
                let today = new Date().toLocaleString("id-ID");
                let selectedCatNames = selectedCategories.map(c => c.toUpperCase()).join(', ');

                let dataToSave = {
                    nama: playerName,
                    tanggal: today,
                    kategori: selectedCatNames,
                    benar: correct,
                    salah: wrong,
                    rataWaktu: avgTime,
                    totalWaktu: totalWaktuKeseluruhan
                };

                fetch(`${DB_API_URL}?action=save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSave)
                }).catch(err => console.error("Gagal simpan ke DB", err));
            }
        };

        async function loadCategories() {
            try {
                const response = await fetch('materi.json');
                const data = await response.json();
                const selectElement = document.getElementById('kategori');
                selectElement.innerHTML = "";

                Object.keys(data).forEach(category => {
                    let option = document.createElement('option');
                    option.value = category;
                    option.textContent = category.toUpperCase();
                    selectElement.appendChild(option);
                });
            } catch (error) {
                console.error("Gagal memuat modul:", error);
            }
        }

        loadCategories();
    </script>
</body>

</html>
