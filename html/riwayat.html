<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Database Riwayat Developer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Poppins', sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .card {
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="card p-4 shadow">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-primary">📊 Database Eksekusi</h2>
                <a href="index.html" class="btn btn-dark fw-bold">⬅ Kembali</a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover table-bordered text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Developer</th>
                            <th>Timestamp</th>
                            <th>Modul</th>
                            <th>Score (✅)</th>
                            <th>Bugs (🐛)</th>
                            <th>Avg. Speed</th>
                            <th>Total Uptime</th>
                        </tr>
                    </thead>
                    <tbody id="dbTableBody">
                        <tr>
                            <td colspan="7">Memuat log dari server...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="text-end mt-3">
                <button class="btn btn-danger fw-bold" onclick="clearDatabase()">🗑️ Drop Database (Reset)</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'api.php';

        function renderDatabase() {
            fetch(`${API_URL}?action=get`)
                .then(res => res.json())
                .then(history => {
                    const tbody = document.getElementById('dbTableBody');
                    tbody.innerHTML = "";

                    if (!history || history.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="7" class="text-muted fw-bold py-4">Query Result: 0 rows.</td></tr>`;
                        return;
                    }

                    history.forEach(row => {
                        let tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="fw-bold text-primary">${row.nama}</td>
                            <td class="text-secondary small">${row.tanggal}</td>
                            <td><span class="badge bg-secondary">${row.kategori}</span></td>
                            <td class="text-success fw-bold fs-5">${row.benar}</td>
                            <td class="text-danger fw-bold fs-5">${row.salah}</td>
                            <td>${row.rataWaktu}s</td>
                            <td>${row.totalWaktu}s</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => {
                    document.getElementById('dbTableBody').innerHTML = `<tr><td colspan="7" class="text-danger">Koneksi Database Gagal.</td></tr>`;
                });
        }

        function clearDatabase() {
            Swal.fire({
                title: 'Drop Table Riwayat?',
                text: "Semua log akan dihapus secara permanen!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Eksekusi (Delete)',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch(`${API_URL}?action=clear`, { method: 'POST' })
                        .then(() => {
                            Swal.fire('Terhapus!', 'Log berhasil dibersihkan.', 'success');
                            renderDatabase();
                        })
                        .catch(err => Swal.fire('Error', 'Gagal menghapus log.', 'error'));
                }
            })
        }

        renderDatabase();
    </script>
</body>

</html>
