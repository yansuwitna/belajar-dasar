<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kuis Matematika Ceria</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: linear-gradient(135deg, #ffe066, #74c0fc);
            font-family: 'Poppins', sans-serif;
        }

        .card {
            border-radius: 25px;
            background: #fff;
        }

        h1,
        h2,
        h3 {
            font-weight: bold
        }

        #answers {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .answer-btn {
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            font-size: 2.5rem;
            width: 140px;
            height: 90px;
            margin: 10px;
            border-radius: 20px;
        }

        @keyframes pop {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.3)
            }

            100% {
                transform: scale(1)
            }
        }

        @keyframes shake {
            0% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-12px)
            }

            50% {
                transform: translateX(12px)
            }

            75% {
                transform: translateX(-12px)
            }

            100% {
                transform: translateX(0)
            }
        }

        .correct {
            animation: pop .4s
        }

        .wrong {
            animation: shake .4s
        }

        .emoji {
            font-size: 100px;
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: fade .9s forwards;
            z-index: 9999;
        }

        @keyframes fade {
            to {
                opacity: 0
            }
        }
    </style>
</head>

<body>
    <div class="container py-4">

        <h1 class="text-center mb-3">🧮🎉 KUIS MATEMATIKA CERIA 🎉🧮</h1>

        <div id="setup" class="card p-4 shadow">
            <h3 class="text-center">🎈 Ayo Mulai Bermain!</h3>
            <form id="setupForm">
                <div class="mt-3">
                    <label>👤 Nama Pemain</label>
                    <input id="playerName" type="text" class="form-control form-control-lg"
                        placeholder="Masukkan namamu..." required>
                </div>

                <div class="row mt-3">
                    <div class="col">
                        <label>Angka 1 (min)</label>
                        <input id="min1" type="number" class="form-control form-control-lg" value="0">
                    </div>
                    <div class="col">
                        <label>Angka 1 (max)</label>
                        <input id="max1" type="number" class="form-control form-control-lg" value="10">
                    </div>
                </div>

                <div class="row mt-2">
                    <div class="col">
                        <label>Angka 2 (min)</label>
                        <input id="min2" type="number" class="form-control form-control-lg" value="0">
                    </div>
                    <div class="col">
                        <label>Angka 2 (max)</label>
                        <input id="max2" type="number" class="form-control form-control-lg" value="10">
                    </div>
                </div>

                <div class="mt-3">
                    <label>⏱ Waktu Menjawab (detik)</label>
                    <input id="timeLimit" type="number" class="form-control form-control-lg" value="10">
                </div>

                <div class="mt-3">
                    <label>🔢 Pilih Operasi</label>
                    <select id="operation" class="form-select form-select-lg" multiple required>
                        <option value="+" selected>➕ Tambah</option>
                        <option value="-">➖ Kurang</option>
                        <option value="*">✖ Kali</option>
                        <option value="/">➗ Bagi</option>
                    </select>
                </div>

                <div class="mt-3">
                    <label>👁️ Tampilan Teks Soal</label>
                    <select id="showTextOpt" class="form-select form-select-lg">
                        <option value="yes" selected>Tampilkan Teks Soal</option>
                        <option value="no">Sembunyikan (Hanya Suara)</option>
                    </select>
                </div>

                <div class="mt-3">
                    <label>🔊 Tombol Ulangi Suara</label>
                    <select id="showRepeatOpt" class="form-select form-select-lg">
                        <option value="yes">Aktifkan Tombol Ulangi</option>
                        <option value="no" selected>Nonaktifkan</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-warning btn-lg w-100 mt-4">🚀 MULAI MAIN</button>
                <!-- <a href="riwayat.html" class="btn btn-outline-dark w-100 mt-2">📊 Lihat Halaman Riwayat</a> -->
            </form>
        </div>

        <div id="quiz" class="card p-4 shadow mt-4 d-none">
            <div class="d-flex justify-content-between mb-3">
                <span class="badge bg-success fs-4">😊 Benar: <span id="liveCorrect">0</span></span>
                <span class="badge bg-danger fs-4">😢 Salah: <span id="liveWrong">0</span></span>
            </div>

            <div class="progress mb-3" style="height:30px">
                <div id="timeBar" class="progress-bar bg-info fs-4"></div>
            </div>

            <h1 id="question" class="text-center display-1 my-3"></h1>

            <div class="text-center mb-3">
                <button id="btnRepeat" class="btn btn-info btn-lg d-none">🔊 Ulangi Soal</button>
            </div>

            <div id="answers"></div>

            <button id="stopQuiz" class="btn btn-danger btn-lg w-100 mt-4">🛑 SELESAI</button>
        </div>

        <div id="result" class="card p-4 shadow mt-4 text-center d-none">
            <h2>🏆 HASIL AKHIR 🏆</h2>
            <h3 class="text-primary mb-3">Selamat, <span id="displayName"></span>!</h3>
            <p class="fs-1 text-success mb-1">😊 Benar: <span id="correct">0</span></p>
            <p class="fs-1 text-danger mb-1">😢 Salah: <span id="wrong">0</span></p>
            <p class="fs-3 text-info mb-1">⏱️ Rata-rata: <span id="avgTimeDisplay">0</span></p>
            <p class="fs-3 text-warning">⏳ Total Waktu Main: <span id="totalTimeDisplay">0</span></p>

            <button class="btn btn-primary btn-lg mt-2" onclick="location.reload()">🔄 Main Lagi</button>
            <!-- <a href="riwayat.html" class="btn btn-secondary btn-lg mt-2">📊 Kelola Riwayat</a> -->

            <div class="mt-5 text-start">
                <h4 class="mb-3">📊 Riwayat Kuis</h4>
                <div class="table-responsive">
                    <table class="table table-bordered table-striped text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>Nama</th>
                                <th>Tanggal</th>
                                <th>Operasi</th>
                                <th>Benar</th>
                                <th>Salah</th>
                                <th>Rata-rata Waktu</th>
                                <th>Total Waktu Main</th>
                            </tr>
                        </thead>
                        <tbody id="dbTableBody">
                            <tr>
                                <td colspan="7">Memuat data dari server...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <audio id="sndOk" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.wav"></audio>
    <audio id="sndFail" src="https://assets.mixkit.co/sfx/preview/mixkit-cartoon-failure-piano-473.wav"></audio>
    <audio id="sndTime" src="https://assets.mixkit.co/sfx/preview/mixkit-alarm-tone-996.wav"></audio>

    <script>
        let playerName = "", min1, max1, min2, max2, timeLimit, ops;
        let isShowText, isShowRepeat;
        let correct = 0, wrong = 0, timer, current;
        let totalTimeSpent = 0, totalQuestions = 0, questionStartTime = 0;
        let quizSessionStartTime = 0; // Tambahan untuk total waktu pengerjaan

        const q = document.getElementById("question");
        const ans = document.getElementById("answers");
        const bar = document.getElementById("timeBar");
        const btnRepeat = document.getElementById("btnRepeat");
        const sndOk = document.getElementById("sndOk");
        const sndFail = document.getElementById("sndFail");
        const sndTime = document.getElementById("sndTime");

        const API_URL = 'api.php';

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID';
            utterance.rate = 1.0;
            utterance.pitch = 1.2;
            window.speechSynthesis.speak(utterance);
        }

        function rand(a, b) {
            return Math.floor(Math.random() * (b - a + 1)) + a;
        }

        function gen() {
            let a = rand(min1, max1);
            let b = rand(min2, max2);
            let op = ops[rand(0, ops.length - 1)];

            if (op === "-" && a < b) [a, b] = [b, a];
            if (op === "/") {
                b = rand(1, 9);
                a = b * rand(1, 9);
            }

            let result = eval(`${a}${op}${b}`);
            let options = [result];

            while (options.length < 3) {
                let fake = result + rand(-10, 10);
                if (!options.includes(fake) && fake >= 0) {
                    options.push(fake);
                }
            }

            const opNames = { "+": "tambah", "-": "kurang", "*": "kali", "/": "bagi" };
            const textToSay = `${a} ${opNames[op]} ${b} sama dengan berapa?`;

            return {
                question: `${a} ${op} ${b}`,
                answer: result,
                options: options.sort(() => Math.random() - 0.5),
                speechText: textToSay
            };
        }

        function startQuiz() {
            clearInterval(timer);
            current = gen();
            questionStartTime = Date.now();

            if (isShowText) {
                q.textContent = current.question;
            } else {
                q.textContent = "🔊 Dengarkan...";
            }

            if (isShowRepeat) {
                btnRepeat.classList.remove("d-none");
            } else {
                btnRepeat.classList.add("d-none");
            }

            ans.innerHTML = "";
            speak(current.speechText);

            current.options.forEach(val => {
                const btn = document.createElement("button");
                btn.className = "btn btn-outline-primary answer-btn";
                btn.textContent = val;
                btn.onclick = () => checkAnswer(val);
                ans.appendChild(btn);
            });

            let t = timeLimit;
            bar.style.width = "100%";
            timer = setInterval(() => {
                t--;
                bar.style.width = (t / timeLimit * 100) + "%";
                if (t <= 0) {
                    clearInterval(timer);
                    let timeSpent = (Date.now() - questionStartTime) / 1000;
                    totalTimeSpent += timeSpent;
                    totalQuestions++;
                    wrong++;
                    document.getElementById("liveWrong").textContent = wrong;
                    sndTime.play();
                    speak("Yah, waktu habis!");
                    Swal.fire({
                        icon: "warning",
                        title: "⏰ Waktu Habis!",
                        confirmButtonText: "Lanjut Soal"
                    }).then(startQuiz);
                }
            }, 1000);
        }

        function checkAnswer(val) {
            clearInterval(timer);
            let timeSpent = (Date.now() - questionStartTime) / 1000;
            totalTimeSpent += timeSpent;
            totalQuestions++;
            document.querySelectorAll(".answer-btn").forEach(b => b.disabled = true);

            if (val === current.answer) {
                correct++;
                document.getElementById("liveCorrect").textContent = correct;
                sndOk.play();
                confetti();
                speak("Hore, kamu benar!");
                Swal.fire({
                    icon: "success",
                    title: "🎉 BENAR!",
                    confirmButtonText: "Lanjut Soal"
                }).then(startQuiz);
            } else {
                wrong++;
                document.getElementById("liveWrong").textContent = wrong;
                sndFail.play();
                speak("Ups, masih salah.");
                Swal.fire({
                    icon: "error",
                    title: "😢 SALAH",
                    text: `Jawaban benar: ${current.answer}`,
                    confirmButtonText: "Lanjut Soal"
                }).then(startQuiz);
            }
        }

        btnRepeat.onclick = () => {
            if (current && current.speechText) speak(current.speechText);
        };

        function renderDatabase() {
            fetch(`${API_URL}?action=get`)
                .then(res => res.json())
                .then(history => {
                    const tbody = document.getElementById('dbTableBody');
                    tbody.innerHTML = "";

                    if (!history || history.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="7" class="text-muted">Belum ada riwayat kuis di server</td></tr>`;
                        return;
                    }

                    history.forEach(row => {
                        let tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="fw-bold">${row.nama}</td>
                            <td>${row.tanggal}</td>
                            <td>${row.operasi}</td>
                            <td class="text-success fw-bold">${row.benar}</td>
                            <td class="text-danger fw-bold">${row.salah}</td>
                            <td>${row.rataWaktu} detik</td>
                            <td>${row.totalWaktu} detik</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => {
                    console.error("Gagal mengambil data:", err);
                    document.getElementById('dbTableBody').innerHTML = `<tr><td colspan="7" class="text-danger">Gagal terhubung ke server database.</td></tr>`;
                });
        }

        document.getElementById("setupForm").addEventListener("submit", function (e) {
            e.preventDefault();
            playerName = document.getElementById("playerName").value;
            min1 = Number(document.getElementById("min1").value);
            max1 = Number(document.getElementById("max1").value);
            min2 = Number(document.getElementById("min2").value);
            max2 = Number(document.getElementById("max2").value);
            timeLimit = Number(document.getElementById("timeLimit").value);
            isShowText = document.getElementById("showTextOpt").value === "yes";
            isShowRepeat = document.getElementById("showRepeatOpt").value === "yes";
            ops = [...document.getElementById("operation").selectedOptions].map(o => o.value);

            if (ops.length === 0) {
                alert("Pilih minimal satu operasi!");
                return;
            }

            correct = 0; wrong = 0; totalTimeSpent = 0; totalQuestions = 0;
            document.getElementById("liveCorrect").textContent = correct;
            document.getElementById("liveWrong").textContent = wrong;
            document.getElementById("setup").classList.add("d-none");
            document.getElementById("quiz").classList.remove("d-none");

            // Catat waktu mulai main sesi keseluruhan
            quizSessionStartTime = Date.now();
            startQuiz();
        });

        document.getElementById("stopQuiz").onclick = () => {
            clearInterval(timer);
            window.speechSynthesis.cancel();

            // Hitung waktu keseluruhan dari mulai sampai selesai
            let totalWaktuKeseluruhan = ((Date.now() - quizSessionStartTime) / 1000).toFixed(2);

            document.getElementById("quiz").classList.add("d-none");
            document.getElementById("result").classList.remove("d-none");
            document.getElementById("displayName").textContent = playerName;
            document.getElementById("correct").textContent = correct;
            document.getElementById("wrong").textContent = wrong;
            document.getElementById("totalTimeDisplay").textContent = `${totalWaktuKeseluruhan} detik`;

            let avgTime = totalQuestions > 0 ? (totalTimeSpent / totalQuestions).toFixed(2) : 0;
            document.getElementById("avgTimeDisplay").textContent = `${avgTime} detik/soal`;

            if (totalQuestions > 0) {
                let today = new Date().toLocaleString("id-ID");
                let opNamesMap = { "+": "Tambah", "-": "Kurang", "*": "Kali", "/": "Bagi" };
                let selectedOpsNames = ops.map(o => opNamesMap[o]).join(', ');

                let dataToSave = {
                    nama: playerName,
                    tanggal: today,
                    operasi: selectedOpsNames,
                    benar: correct,
                    salah: wrong,
                    rataWaktu: avgTime,
                    totalWaktu: totalWaktuKeseluruhan
                };

                fetch(`${API_URL}?action=save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSave)
                })
                    .then(res => res.json())
                    .then(response => {
                        renderDatabase();
                        speak(`Luar biasa ${playerName}! Kamu berhasil menjawab ${correct} soal dengan benar.`);
                    })
                    .catch(err => console.error("Gagal menyimpan ke server", err));
            } else {
                renderDatabase();
                speak("Kamu belum menjawab soal apapun.");
            }
        };

        renderDatabase();
    </script>
</body>

</html>
