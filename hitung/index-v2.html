<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kuis Matematika Ceria</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #ffe066, #74c0fc);
            font-family: 'Comic Sans MS', 'Baloo', cursive;
        }

        .card {
            border-radius: 25px;
            background: #fff;
        }

        h1,
        h2,
        h3 {
            font-weight: bold
        }

        #answers {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .answer-btn {
            font-size: 2.5rem;
            width: 140px;
            height: 90px;
            margin: 10px;
            border-radius: 20px;
        }

        @keyframes pop {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.3)
            }

            100% {
                transform: scale(1)
            }
        }

        @keyframes shake {
            0% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-12px)
            }

            50% {
                transform: translateX(12px)
            }

            75% {
                transform: translateX(-12px)
            }

            100% {
                transform: translateX(0)
            }
        }

        .correct {
            animation: pop .4s
        }

        .wrong {
            animation: shake .4s
        }

        .emoji {
            font-size: 100px;
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: fade .9s forwards;
            z-index: 9999;
        }

        @keyframes fade {
            to {
                opacity: 0
            }
        }
    </style>
</head>

<body>
    <div class="container py-4">

        <h1 class="text-center mb-3">🧮🎉 KUIS MATEMATIKA CERIA 🎉🧮</h1>

        <!-- SETUP -->
        <div id="setup" class="card p-4 shadow">
            <h3 class="text-center">🎈 Ayo Mulai Bermain!</h3>
            <form id="setupForm">

                <div class="row mt-3">
                    <div class="col">
                        <label>Angka 1 (min)</label>
                        <input id="min1" type="number" class="form-control form-control-lg" value="0">
                    </div>
                    <div class="col">
                        <label>Angka 1 (max)</label>
                        <input id="max1" type="number" class="form-control form-control-lg" value="10">
                    </div>
                </div>

                <div class="row mt-2">
                    <div class="col">
                        <label>Angka 2 (min)</label>
                        <input id="min2" type="number" class="form-control form-control-lg" value="0">
                    </div>
                    <div class="col">
                        <label>Angka 2 (max)</label>
                        <input id="max2" type="number" class="form-control form-control-lg" value="10">
                    </div>
                </div>

                <div class="mt-3">
                    <label>⏱ Waktu Menjawab (detik)</label>
                    <input id="timeLimit" type="number" class="form-control form-control-lg" value="10">
                </div>

                <div class="mt-3">
                    <label>🔢 Pilih Operasi</label>
                    <select id="operation" class="form-select form-select-lg" multiple>
                        <option value="+">➕ Tambah</option>
                        <option value="-">➖ Kurang</option>
                        <option value="*">✖ Kali</option>
                        <option value="/">➗ Bagi</option>
                    </select>
                </div>

                <button class="btn btn-warning btn-lg w-100 mt-4">🚀 MULAI MAIN</button>
            </form>
        </div>

        <!-- QUIZ -->
        <div id="quiz" class="card p-4 shadow mt-4 d-none">

            <div class="d-flex justify-content-between mb-3">
                <span class="badge bg-success fs-4">😊 Benar: <span id="liveCorrect">0</span></span>
                <span class="badge bg-danger fs-4">😢 Salah: <span id="liveWrong">0</span></span>
            </div>

            <div class="progress mb-3" style="height:30px">
                <div id="timeBar" class="progress-bar bg-info fs-4"></div>
            </div>

            <h1 id="question" class="text-center display-1 my-3"></h1>

            <div id="answers"></div>

            <button id="stopQuiz" class="btn btn-danger btn-lg w-100 mt-4">🛑 SELESAI</button>
        </div>

        <!-- RESULT -->
        <div id="result" class="card p-4 shadow mt-4 text-center d-none">
            <h2>🏆 HASIL AKHIR 🏆</h2>
            <p class="fs-1 text-success">😊 Benar: <span id="correct">0</span></p>
            <p class="fs-1 text-danger">😢 Salah: <span id="wrong">0</span></p>
            <button class="btn btn-primary btn-lg" onclick="location.reload()">🔄 Main Lagi</button>
        </div>

    </div>

    <!-- AUDIO -->
    <audio id="sndOk" preload="auto"
        src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.wav"></audio>

    <audio id="sndFail" preload="auto"
        src="https://assets.mixkit.co/sfx/preview/mixkit-cartoon-failure-piano-473.wav"></audio>

    <script>
        let min1, max1, min2, max2, timeLimit, ops;
        let correct = 0, wrong = 0, timer;

        const q = document.getElementById("question");
        const ans = document.getElementById("answers");
        const bar = document.getElementById("timeBar");
        const ok = document.getElementById("sndOk");
        const fail = document.getElementById("sndFail");

        function unlock() {
            [ok, fail].forEach(s => {
                s.volume = 0;
                s.play().then(() => {
                    s.pause(); s.currentTime = 0; s.volume = 1;
                }).catch(() => { });
            });
        }

        function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a }

        function emoji(e) {
            let d = document.createElement("div");
            d.className = "emoji"; d.textContent = e;
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 900);
        }

        function boom() {
            confetti({ particleCount: 150, spread: 90, origin: { y: .6 } });
        }

        function gen() {
            let a = rand(min1, max1), b = rand(min2, max2);
            let op = ops[rand(0, ops.length - 1)];
            if (op === "-" && a < b) [a, b] = [b, a];
            if (op === "/") { b = rand(1, max2 || 9); a = b * rand(1, 9); }
            let answ = eval(`${a}${op}${b}`);
            let o = [answ];
            while (o.length < 3) {
                let f = answ + rand(-10, 10);
                if (!o.includes(f) && f >= 0) o.push(f);
            }
            return { q: `${a} ${op} ${b}`, ans: answ, ops: o.sort(() => Math.random() - 0.5) };
        }

        function start() {
            clearInterval(timer);
            const d = gen();
            q.textContent = d.q;
            ans.innerHTML = "";

            d.ops.forEach(v => {
                let b = document.createElement("button");
                b.className = "btn btn-outline-primary answer-btn";
                b.textContent = v;
                b.onclick = () => {
                    document.querySelectorAll(".answer-btn").forEach(x => x.disabled = true);
                    clearInterval(timer);

                    if (v === d.ans) {
                        correct++; document.getElementById("liveCorrect").textContent = correct;
                        ok.currentTime = 0; ok.play();
                        b.classList.add("btn-success", "correct");
                        emoji("🎉"); boom();
                    } else {
                        wrong++; document.getElementById("liveWrong").textContent = wrong;
                        fail.currentTime = 0; fail.play();
                        b.classList.add("btn-danger", "wrong");
                        emoji("😢");
                    }
                    setTimeout(start, 900);
                };
                ans.appendChild(b);
            });

            let t = timeLimit;
            bar.style.width = "100%";
            timer = setInterval(() => {
                t--;
                bar.style.width = (t / timeLimit * 100) + "%";
                if (t <= 0) {
                    clearInterval(timer);
                    wrong++; document.getElementById("liveWrong").textContent = wrong;
                    fail.play(); emoji("⌛");
                    start();
                }
            }, 1000);
        }

        document.getElementById("setupForm").onsubmit = e => {
            e.preventDefault();
            unlock();
            min1 = +document.getElementById("min1").value;
            max1 = +document.getElementById("max1").value;
            min2 = +document.getElementById("min2").value;
            max2 = +document.getElementById("max2").value;
            timeLimit = +document.getElementById("timeLimit").value;
            ops = [...document.getElementById("operation").selectedOptions].map(o => o.value);
            document.getElementById("setup").classList.add("d-none");
            document.getElementById("quiz").classList.remove("d-none");
            start();
        };

        document.getElementById("stopQuiz").onclick = () => {
            clearInterval(timer);
            quiz.classList.add("d-none");
            result.classList.remove("d-none");
            document.getElementById("correct").textContent = correct;
            document.getElementById("wrong").textContent = wrong;
        };
    </script>
</body>

</html>
